<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的个人主页</title>
 <style>
    /* 给整个页面加上酷炫壁纸 */
    body {
        background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        background-color: #1e1e1e; /* 备用深色背景 */
        
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* 给中间的容器加个半透明黑底，让头像和按钮更清晰 */
    .main-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 50px;
        gap: 30px;
        font-family: sans-serif;
        background: rgba(0, 0, 0, 0.5); /* 半透明黑色 */
        border-radius: 20px; /* 圆角 */
    }

    /* 头像按钮样式 */
    .bilibili-avatar-btn {
        display: block;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 4px solid #fb7299;
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .bilibili-avatar-btn:hover {
        transform: scale(1.1);
        box-shadow: 0 0 15px rgba(251, 114, 153, 0.6);
    }
    .bilibili-avatar-btn img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* 跳转下载页按钮 */
    .go-download-btn {
        display: inline-block;
        text-decoration: none;
        background-color: #0078d4;
        color: white;
        padding: 12px 25px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 14px;
        transition: transform 0.2s ease, opacity 0.2s ease;
        width: 220px;
        text-align: center;
    }
    .go-download-btn:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }
</style>
</head>
<body>
    <div class="main-container">
        <!-- 1. B站头像按钮 -->
        <a href="me.avif" target="_blank" class="bilibili-avatar-btn">
            <img src="https://i2.hdslb.com/bfs/face/e754fba2a956c58a0b042d9bbff5ac2442167e3a.jpg@240w_240h_1c_1s_!web-avatar-nav.avif" alt="我的B站头像">
        </a>

        <!-- 2. 前往下载页面按钮（注意：这里必须指向 download.html） -->
        <a href="download.html" class="go-download-btn">
            下载 Windows 镜像页面
        </a>
    </div>
</body>
</html>
