<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>欢迎来到sc_MC的个人网站</title>
 <style>
    body {
        background-image: url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=2070&auto=format&fit=crop');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        background-color: #1e1e1e; /* 备用深色背景 */
        
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* 给中间的容器加个半透明黑底，让头像和按钮更清晰 */
    .main-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 50px;
        gap: 30px;
        font-family: sans-serif;
        background: rgba(0, 0, 0, 0.5); /* 半透明黑色 */
        border-radius: 20px; /* 圆角 */
    }

    /* 新增：头像与文字的整体容器 */
    .avatar-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
    }

    /* 头像按钮样式 */
    .bilibili-avatar-btn {
        display: block;
        width: 100px;
        height: 100px;
        border-radius: 50%;
        border: 4px solid #fb7299;
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        cursor: pointer;
    }
    /* 鼠标悬停在头像上时，头像稍微放大并带光晕 */
    .avatar-wrapper:hover .bilibili-avatar-btn {
        transform: scale(1.1);
        box-shadow: 0 0 15px rgba(251, 114, 153, 0.6);
    }
    .bilibili-avatar-btn img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* 新增：B站文字样式（默认隐藏） */
    .bilibili-text {
        color: #fb7299; /* B站粉色 */
        font-weight: bold;
        font-size: 14px;
        margin-top: 10px;
        
        /* 核心隐藏与动画效果 */
        opacity: 0; 
        transform: translateY(-5px); /* 默认稍微往上藏一点 */
        transition: all 0.3s ease; /* 0.3秒的平滑过渡 */
    }
    /* 鼠标悬停在头像外壳上时，文字显现并归位 */
    .avatar-wrapper:hover .bilibili-text {
        opacity: 1;
        transform: translateY(0);
    }

    /* 跳转下载页按钮 */
    .go-download-btn {
        display: inline-block;
        text-decoration: none;
        background-color: #0078d4;
        color: white;
        padding: 12px 25px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 14px;
        transition: transform 0.2s ease, opacity 0.2s ease;
        width: 220px;
        text-align: center;
    }
    .go-download-btn:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }
</style>
</head>
<body>
    <div class="main-container">
        <!-- 头像和文字的整体外壳 -->
        <div class="avatar-wrapper">
            <a href="https://space.bilibili.com/3706940798536112" target="_blank" class="bilibili-avatar-btn">
                <img src="me.avif" alt="我的B站头像">
            </a>
            <!-- 文字现在只是纯展示，没有链接了 -->
            <span class="bilibili-text">作者B站</span>
        </div>

        <a href="download.html" class="go-download-btn">
            sc_MC镜像下载站
        </a>
    </div>
</body>
</html>
